# configs/tree_rcnn_v2.yaml
# TreeRCNN v2.0 — конфиг для обучения с FPN + Voting + RelationHead
#
# Ключевое отличие от tree_rcnn.yaml: model_version: v2
# Все остальные поля идентичны.

model_version: v2

preprocessing:
  min_height: 0.5
  chm_resolution: 0.5
  local_maxima_min_height: 5.0
  closing_window: 3
  local_maxima_window: 3

crown_regression:
  slope: 0.0512
  intercept: 1.1048

anchors:
  height_levels: [2, 4, 8, 16, 26, 36]
  sw_stride_ratio: 0.5
  si_ratio: 0.2
  boundary_extension_ratio: 0.5

stage1_nms:
  ad_iouv_threshold: 0.6
  ad_max_proposals: 2500
  al_iouv_threshold: 0.6
  al_max_proposals_per_maxima: 5

stage2_nms:
  score_threshold: 0.4
  iouv_threshold: 0.4

label_assignment:
  positive_iouv_overlap: 0.4
  positive_ioub_overlap: 0.65
  positive_iouh_overlap: 0.7

pointnet2:
  npoints_per_window: 512
  sa_layers:
    - npoint: 64
      radius: 0.5
      nsample: 32
      mlp: [3, 32, 32, 64]         # SA1: out=64
    - npoint: 32
      radius: 1.0
      nsample: 32
      mlp: [64, 64, 128]           # SA2: out=128  ← point-wise для Stage2Head
    - npoint: 16
      radius: 3.0
      nsample: 16
      mlp: [128, 256, 512]         # SA3 (SA-extra): out=512  ← НОВЫЙ
    - npoint: null
      radius: null
      nsample: null
      mlp: [512, 512, 1024]        # SA4: global, out=1024

# FPN: соединяет выходы SA2, SA3, SA4
fpn:
  in_channels: [128, 512, 1024]    # выходы SA2, SA3(extra), SA4
  out_channels: 256

# RelationHead (Stage 3)
relation_head:
  feat_dim: 1024
  coord_dim: 5
  n_heads: 8
  n_layers: 2

training:
  epochs: 5000
  batch_size: 1
  optimizer: adagrad
  learning_rate: 0.0001
  weight_decay: 0.0
  n_positive: 256
  n_negative: 256
  lambda_reg: 1.0
  lambda_v_reg: 2.0          # повышенный вес z/h компонент
  lambda_offset: 0.5
  lambda_centerness: 0.5
  lambda_stage3: 0.5
  max_points: 40000
  checkpoint_interval: 100
  val_interval: 100
  num_workers: 4
  stage2_forward_chunk: 256
  stage2_infer_chunk: 256
  stage3_max_proposals: 500
  freeze_stage2_epochs: 0      # 0 = не замораживать
  freeze_stage3_epochs: 50     # Stage 3 подключается после 50 эпох
  augmentation:
    random_rotation: true
    rotation_range: 360
    random_translation: true
    translation_range: 0.5

cross_validation:
  n_folds: 4
  folds:
    - [1]
    - [2, 3, 4, 6, 7]
    - [5, 8, 9, 10]
    - [11, 12, 13, 14]

seed: 42
