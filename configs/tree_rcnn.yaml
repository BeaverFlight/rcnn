preprocessing:
  min_height: 0.5
  chm_resolution: 0.5
  local_maxima_min_height: 5.0
  closing_window: 3
  local_maxima_window: 3

crown_regression:
  slope: 0.0512
  intercept: 1.1048

anchors:
  height_levels: [2, 4, 8, 16, 26, 36]
  sw_stride_ratio: 0.5
  si_ratio: 0.2
  boundary_extension_ratio: 0.5

stage1_nms:
  ad_iouv_threshold: 0.6
  ad_max_proposals: 2500
  al_iouv_threshold: 0.6
  al_max_proposals_per_maxima: 5

stage2_nms:
  score_threshold: 0.4
  iouv_threshold: 0.4

label_assignment:
  positive_iouv_overlap: 0.4
  positive_ioub_overlap: 0.65
  positive_iouh_overlap: 0.7

pointnet2:
  npoints_per_window: 512
  sa_layers:
    - npoint: 64
      radius: 0.5
      nsample: 32
      mlp: [3, 32, 32, 64]
    - npoint: 32
      radius: 1.0
      nsample: 32
      mlp: [64, 64, 128]
    - npoint: null
      radius: null
      nsample: null
      mlp: [128, 256, 512]

training:
  epochs: 5000
  batch_size: 1
  optimizer: adagrad
  learning_rate: 0.0001
  n_positive: 256
  n_negative: 256
  lambda_reg: 1.0
  max_points: 40000
  checkpoint_interval: 100
  augmentation:
    random_rotation: true
    rotation_range: 360
    random_translation: true
    translation_range: 0.5

cross_validation:
  n_folds: 4
  folds:
    - [1]
    - [2, 3, 4, 6, 7]
    - [5, 8, 9, 10]
    - [11, 12, 13, 14]

seed: 42
