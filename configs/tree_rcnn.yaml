preprocessing:
  min_height: 0.5
  chm_resolution: 0.5
  local_maxima_min_height: 5.0
  closing_window: 3
  local_maxima_window: 3

crown_regression:
  slope: 0.0512
  intercept: 1.1048

anchors:
  height_levels: [2, 4, 8, 16, 26, 36]
  sw_stride_ratio: 0.5
  si_ratio: 0.2
  boundary_extension_ratio: 0.5

stage1_nms:
  ad_iouv_threshold: 0.6
  ad_max_proposals: 2500
  al_iouv_threshold: 0.6
  al_max_proposals_per_maxima: 5

stage2_nms:
  score_threshold: 0.4
  iouv_threshold: 0.4

label_assignment:
  positive_iouv_overlap: 0.4
  positive_ioub_overlap: 0.65
  positive_iouh_overlap: 0.7

pointnet2:
  npoints_per_window: 512
  sa_layers:
    - npoint: 64
      radius: 0.5
      nsample: 32
      mlp: [3, 32, 32, 64]
    - npoint: 32
      radius: 1.0
      nsample: 32
      mlp: [64, 64, 128]
    - npoint: null
      radius: null
      nsample: null
      mlp: [128, 256, 512]

# ─── PointNeXt backbone ───────────────────────────────────────────────
# Используется только если build_model увидит backbone: pointnext в конфиге.
# Параметры по умолчанию соответствуют иерархии SA1/SA2/SA3-extra/Global
# из tree_rcnn_v2.py. Менять только если знаешь что делаешь.
pointnext:
  # npoints, radii, nsamples — три SA-слоя (не считая Global)
  npoints:  [512, 256, 128]
  radii:    [2.0, 4.0, 8.0]
  nsamples: [64,  64,  64]
  # channels[i] — MLP-выходы i-го SA-слоя; channels[3] — Global SA
  channels:
    - [32,  64]    # SA1
    - [64,  128]   # SA2
    - [128, 256]   # SA3-extra
    - [256, 512]   # SA-global

# ─── Тайлинг (TrainingTiler) ──────────────────────────────────────────
# enabled: true  — случайная нарезка тайлов в __getitem__ во время обучения
# enabled: false — старый режим random subsampling (по умолчанию, v1-совместимо)
tiling:
  enabled: true
  tile_size: 40.0       # метры — сторона квадратного тайла
  overlap: 10.0         # метры — буферная зона для InferenceTiler
  min_trees: 3          # минимум GT-деревьев в тайле, иначе retry
  max_points: 32768     # максимум точек в тайле (случайная подвыборка если больше)
  min_points: 100       # тайл считается пустым если точек меньше
  max_attempts: 10      # попыток найти непустой тайл за один __getitem__
  center_weight: 1.0    # вес score для центра тайла (InferenceTiler.merge)
  border_weight: 0.5    # вес score для буферной зоны (InferenceTiler.merge)

training:
  epochs: 5000
  batch_size: 1
  optimizer: adagrad
  learning_rate: 0.0001
  weight_decay: 0.0
  n_positive: 256
  n_negative: 256
  lambda_reg: 1.0
  max_points: 40000
  checkpoint_interval: 100
  val_interval: 100
  num_workers: 4
  augmentation:
    random_rotation: true
    rotation_range: 360
    random_translation: true
    translation_range: 0.5

cross_validation:
  n_folds: 4
  folds:
    - [1]
    - [2, 3, 4, 6, 7]
    - [5, 8, 9, 10]
    - [11, 12, 13, 14]

seed: 42
